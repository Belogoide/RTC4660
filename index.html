<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Metas Distrito 4660</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    body {
      margin: 0;
      background-color: #141414;
      font-family: Arial, sans-serif;
      color: #fff;
      overflow-x: hidden;
    }

    header {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(0,0,0,0.8);
      padding: 10px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header img { height: 40px; }

    .btn-clube {
      background-color: #e91e63;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: bold;
      margin-right: 10px;
    }

    .banner {
      height: 60vh;
      background-size: cover;
      display: flex;
      align-items: flex-end;
      padding: 40px;
      margin-top: 70px;
    }

    .banner h2 {
      background: rgba(0,0,0,0.6);
      padding: 10px 20px;
      border-radius: 5px;
    }

    .row { margin: 20px 30px; }

    .cards-container { overflow: hidden; position: relative; }

    .cards {
      display: flex;
      gap: 10px;
      transition: transform 0.4s;
    }

    .card {
      flex: 0 0 200px;
      height: 120px;
      border-radius: 5px;
      background-size: cover;
      display: flex;
      align-items: flex-end;
      padding: 10px;
    }

    .card span {
      background: rgba(0,0,0,0.6);
      padding: 5px 10px;
      border-radius: 3px;
    }

    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.6);
      border: none;
      color: white;
      font-size: 30px;
      cursor: pointer;
      display: none;
    }

    .left { left: 0; }
    .right { right: 0; }

    .cards-container:hover .nav-btn { display: block; }

    .login {
      position: fixed;
      width: 100%;
      height: 100%;
      background: #141414;
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
  </style>
</head>

<body>

<div class="login" id="login">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="senha" placeholder="Senha">
  <button onclick="login()">Entrar</button>
</div>

<header>
  <img src="logo.png">
  <button class="btn-clube" onclick="abrirLogin()">Meu Clube</button>
</header>

<section class="banner" style="background-image:url('banner-principal.png')">
  <h2>Bem-vindo</h2>
</section>

<div class="row">
  <h3>Avenidas</h3>
  <div class="cards-container">
    <button class="nav-btn left" onclick="scrollCards(-1)">❮</button>
    <button class="nav-btn right" onclick="scrollCards(1)">❯</button>

    <div class="cards" id="cards">
      <div class="card" style="background-image:url('tesouraria.jpg')"><span>Tesouraria</span></div>
      <div class="card" style="background-image:url('secretaria.jpg')"><span>Secretaria</span></div>
      <div class="card" style="background-image:url('protocolo.jpg')"><span>Protocolo</span></div>
      <div class="card" style="background-image:url('projetos.jpg')"><span>Projetos</span></div>
      <div class="card" style="background-image:url('empoderamento.jpg')"><span>Empoderamento Feminino</span></div>
      <div class="card" style="background-image:url('dqa.jpg')"><span>DQA</span></div>
      <div class="card" style="background-image:url('imagem-publica.jpg')"><span>Imagem Pública</span></div>
    </div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "rtc4660.firebaseapp.com"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

function abrirLogin() {
  document.getElementById("login").style.display = "flex";
}

window.login = function() {
  const email = email.value;
  const senha = senha.value;

  auth.signInWithEmailAndPassword(email, senha)
    .then(() => {
      document.getElementById("login").style.display = "none";
    })
    .catch(e => alert(e.message));
};

auth.onAuthStateChanged(user => {
  if (user) {
    db.collection("usuarios").doc(user.uid).get()
      .then(doc => {
        if (doc.exists) {
          document.querySelector(".btn-clube").innerText = doc.data().clube;
        }
      });
  }
});

let position = 0;

function scrollCards(direction) {
  const container = document.getElementById('cards');
  const cardWidth = 210;

  position -= direction * cardWidth * 2;

  if (position > 0) position = 0;

  const maxScroll = -(container.scrollWidth - window.innerWidth + 60);
  if (position < maxScroll) position = maxScroll;

  container.style.transform = `translateX(${position}px)`;
}
</script>

</body>
</html>
