<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>RTC 4660</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body {margin:0;background:#141414;color:#fff;font-family:Arial;}

header {
  position:fixed;top:0;width:100%;
  display:flex;justify-content:space-between;
  padding:10px 30px;background:#000;
}

.btn-clube {
  background:#e91e63;
  padding:10px 20px;
  border-radius:20px;
  color:#fff;border:none;
  cursor:pointer;
}

.banner {margin-top:70px;height:60vh;background:url('banner-principal.png') center/cover;display:flex;align-items:flex-end;padding:40px;}
.row {padding:20px;}

.cards {display:flex;gap:10px;transition:0.3s;}
.card {
  width:200px;height:120px;
  background-size:cover;
  display:flex;align-items:flex-end;
  padding:10px;border-radius:5px;
}

.login {
  display:none;
  position:fixed;
  width:100%;height:100%;
  background:#141414;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}
</style>
</head>

<body>

<div id="login" class="login">
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>

<header>
<img src="logo.png" height="40">
<button class="btn-clube" onclick="abrirLogin()">Meu Clube</button>
</header>

<div class="banner"><h2>Bem-vindo</h2></div>

<div class="row">
<div class="cards" id="cards">
<div class="card" style="background-image:url('tesouraria.jpg')"><span>Tesouraria</span></div>
<div class="card" style="background-image:url('secretaria.jpg')"><span>Secretaria</span></div>
<div class="card" style="background-image:url('protocolo.jpg')"><span>Protocolo</span></div>
</div>
</div>

<script>
const firebaseConfig = {
   apiKey: "AIzaSyCtuh636ZIObSEHxEdvOZ3ii8UMWTrSBGI",
  authDomain: "rtc4660.firebaseapp.com"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

function abrirLogin(){
  document.getElementById('login').style.display='flex';
}

function login(){
  const email = document.getElementById('email').value;
  const senha = document.getElementById('senha').value;

  auth.signInWithEmailAndPassword(email, senha)
  .then(()=> document.getElementById('login').style.display='none')
  .catch(e=>alert(e.message));
}

auth.onAuthStateChanged(user=>{
  if(user){
    db.collection("usuarios").doc(user.uid).get()
    .then(doc=>{
      if(doc.exists){
        document.querySelector(".btn-clube").innerText = doc.data().clube;
      }
    });
  }
});
</script>

</body>
</html>
