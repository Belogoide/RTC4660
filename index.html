<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Metas Distrito 4660</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background-color: #141414;
      font-family: Arial, sans-serif;
      color: #fff;
      overflow-x: hidden;
    }

    header {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(0,0,0,0.8);
      padding: 10px 30px;
      z-index: 1000;
      display: flex;
      align-items: center;
    }

    header img {
      height: 40px;
    }

    .banner {
      height: 60vh;
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: flex-end;
      padding: 40px;
      margin-top: 70px;
    }

    .banner h2 {
      font-size: 40px;
      margin: 0;
      background: rgba(0,0,0,0.6);
      padding: 10px 20px;
      border-radius: 5px;
    }

    .row {
      margin: 20px 30px;
      position: relative;
    }

    .row h3 {
      margin-bottom: 10px;
    }

    .cards-container {
      position: relative;
      overflow: hidden;
    }

    .cards {
      display: flex;
      gap: 10px;
      transition: transform 0.4s ease;
    }

    .card {
      min-width: 200px;
      height: 120px;
      background-size: cover;
      background-position: center;
      border-radius: 5px;
      display: flex;
      align-items: flex-end;
      padding: 10px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.3s;
      background-color: #333;
    }

    .card span {
      background: rgba(0,0,0,0.6);
      padding: 5px 10px;
      border-radius: 3px;
    }

    .card:hover {
      transform: scale(1.1);
    }

    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.6);
      border: none;
      color: white;
      font-size: 30px;
      cursor: pointer;
      padding: 10px;
      display: none;
      z-index: 10;
    }

    .left { left: 0; }
    .right { right: 0; }

    .cards-container:hover .nav-btn {
      display: block;
    }

  </style>
</head>

<body>

<header>
  <img src="logo.png" alt="RTC Logo">
</header>

<section class="banner" style="background-image: linear-gradient(to top, #141414, transparent), url('banner-principal.png');">
  <h2>Avenidas RTC</h2>
</section>

<div class="row">
  <h3>Avenidas</h3>

  <div class="cards-container">

    <button class="nav-btn left" onclick="scrollCards(-1)">&#10094;</button>
    <button class="nav-btn right" onclick="scrollCards(1)">&#10095;</button>

    <div class="cards" id="cards">
      <div class="card" style="background-image: url('tesouraria.jpg');"><span>Tesouraria</span></div>
      <div class="card" style="background-image: url('secretaria.jpg');"><span>Secretaria</span></div>
      <div class="card" style="background-image: url('protocolo.jpg');"><span>Protocolo</span></div>
      <div class="card" style="background-image: url('projetos.jpg');"><span>Projetos</span></div>
      <div class="card" style="background-image: url('empoderamento.jpg');"><span>Empoderamento Feminino</span></div>
      <div class="card" style="background-image: url('dqa.jpg');"><span>DQA</span></div>
      <div class="card" style="background-image: url('imagem-publica.jpg');"><span>Imagem Pública</span></div>
    </div>

  </div>
</div>

<script>
  let position = 0;

  function scrollCards(direction) {
    const container = document.getElementById('cards');
    const cardWidth = 210;

    position -= direction * cardWidth * 2;

    if (position > 0) position = 0;

    const maxScroll = -(container.scrollWidth - window.innerWidth + 60);

    if (position < maxScroll) position = maxScroll;

    container.style.transform = `translateX(${position}px)`;
  }
</script>

</body>
</html>
