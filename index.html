<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>RTC 4660</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body {
  margin:0;
  background:#141414;
  color:#fff;
  font-family:Arial;
  overflow-x:hidden;
}

header {
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 30px;
  background:rgba(0,0,0,0.8);
  z-index:1000;
}

header img { height:40px; }

.btn-clube {
  background:#e91e63;
  color:#fff;
  border:none;
  padding:10px 20px;
  border-radius:20px;
  cursor:pointer;
  font-weight:bold;
  margin-right:10px;
}

.banner {
  height:70vh;
  background: linear-gradient(to top,#141414,transparent), url('banner-principal.png');
  background-size:cover;
  background-position:center;
  display:flex;
  align-items:flex-end;
  padding:40px;
  margin-top:70px;
}

.banner h2 {
  background:rgba(0,0,0,0.6);
  padding:10px 20px;
  border-radius:5px;
}

.row { margin:20px 30px; }

.cards-container {
  position:relative;
  overflow:hidden;
}

.cards {
  display:flex;
  gap:10px;
  transition:0.4s;
}

.card {
  flex:0 0 200px;
  height:120px;
  border-radius:5px;
  background-size:cover;
  background-position:center;
  display:flex;
  align-items:flex-end;
  padding:10px;
}

.card span {
  background:rgba(0,0,0,0.6);
  padding:5px 10px;
  border-radius:3px;
}

.nav-btn {
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(0,0,0,0.6);
  border:none;
  color:#fff;
  font-size:30px;
  cursor:pointer;
  display:none;
}

.left { left:0; }
.right { right:0; }

.cards-container:hover .nav-btn { display:block; }

/* LOGIN */
.login {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:#141414;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  gap:10px;
  z-index:2000;
}

.login input, .login select {
  padding:10px;
  width:250px;
}
</style>
</head>

<body>

<!-- LOGIN + CADASTRO -->
<div class="login" id="login">

  <!-- LOGIN -->
  <div id="telaLogin">
    <h3>Login</h3>
    <input id="email" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>

    <p style="cursor:pointer; color:#e91e63;" onclick="mostrarCadastro()">
      Crie sua conta
    </p>
  </div>

  <!-- CADASTRO -->
  <div id="telaCadastro" style="display:none;">
    <h3>Cadastro</h3>
    <input id="emailCad" placeholder="Email">
    <input id="senhaCad" type="password" placeholder="Senha">

    <select id="clube">
      <option value="">Selecione seu clube</option>
      <option>RTC Cruz Alta</option>
      <option>RTC Campina das Missões</option>
      <option>RTC Carazinho</option>
      <option>RTC Cerro Largo</option>
      <option>RTC Frederico Westphalen</option>
      <option>RTC Horizontina</option>
      <option>RTC Ibirubá</option>
      <option>RTC Ijuí - Nova Geração</option>
      <option>RTC Não-Me-Toque</option>
      <option>RTC Palmeira das Missões</option>
      <option>RTC Panambi</option>
      <option>RTC Santa Maria</option>
      <option>RTC Santa Maria Liberdade</option>
      <option>RTC Santa Rosa</option>
      <option>RTC Santo Ângelo</option>
      <option>RTC São Borja Terra dos Presidentes</option>
      <option>RTC São Luiz Gonzaga</option>
      <option>RTC Tenente Portela</option>
      <option>RTC Três de Maio</option>
      <option>RTC Três Passos Junior</option>
      <option>RTC Tucunduva</option>
      <option>RTC Tupanciretã</option>
    </select>

    <button onclick="cadastrar()">Cadastrar</button>

    <p style="cursor:pointer; color:#e91e63;" onclick="mostrarLogin()">
      Voltar para login
    </p>
  </div>

</div>

<header>
  <img src="logo.png" style="cursor:pointer;" onclick="voltarHome()">
  <button class="btn-clube" onclick="abrirLogin()" id="btnClube">Meu Clube</button>
</header>

<section class="banner">
  <h2>Bem-vindo</h2>
</section>

<div class="row">
<h3>Avenidas</h3>

<div class="cards-container">
  <button class="nav-btn left" onclick="scrollCards(-1)">❮</button>
  <button class="nav-btn right" onclick="scrollCards(1)">❯</button>

  <div class="cards" id="cards">
    <div class="card" style="background-image:url('tesouraria.jpg')"><span>Tesouraria</span></div>
    <div class="card" style="background-image:url('secretaria.jpg')"><span>Secretaria</span></div>
    <div class="card" style="background-image:url('protocolo.jpg')"><span>Protocolo</span></div>
    <div class="card" style="background-image:url('projetos.jpg')"><span>Projetos</span></div>
    <div class="card" style="background-image:url('empoderamento.jpg')"><span>Empoderamento Feminino</span></div>
    <div class="card" style="background-image:url('dqa.jpg')"><span>DQA</span></div>
    <div class="card" style="background-image:url('imagem-publica.jpg')"><span>Imagem Pública</span></div>
  </div>
</div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCtuh636ZIObSEHxEdvOZ3ii8UMWTrSBGI",
  authDomain: "rtc4660.firebaseapp.com",
  projectId: "rtc4660",
  storageBucket: "rtc4660.firebasestorage.app",
  messagingSenderId: "700338850051",
  appId: "1:700338850051:web:7e4c50fb54b394aef38136"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

function abrirLogin() {
  document.getElementById("login").style.display = "flex";
}

function login() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  auth.signInWithEmailAndPassword(email, senha)
    .then(() => {
      document.getElementById("login").style.display = "none";
    })
    .catch(e => alert(e.message));
}

function cadastrar() {
  const email = document.getElementById('emailCad').value;
  const senha = document.getElementById('senhaCad').value;
  const clube = document.getElementById('clube').value;

  if (!email || !senha || !clube) {
    alert("Preencha todos os campos");
    return;
  }

  auth.createUserWithEmailAndPassword(email, senha)
    .then(userCredential => {
      const uid = userCredential.user.uid;

      return db.collection("usuarios").doc(uid).set({
        clube: clube
      });
    })
    .then(() => {
      alert("Cadastro realizado com sucesso");
      document.getElementById("login").style.display = "none";
    })
    .catch(e => alert(e.message));
}

auth.onAuthStateChanged(user => {
  if (user) {
    db.collection("usuarios").doc(user.uid).get()
      .then(doc => {
        if (doc.exists) {
          document.getElementById("btnClube").innerText = doc.data().clube;
        }
      });
  }
});

let position = 0;

function scrollCards(direction) {
  const container = document.getElementById('cards');
  const wrapper = container.parentElement;

  const cardWidth = 210;
  const visibleWidth = wrapper.offsetWidth;
  const totalWidth = container.scrollWidth;

  position -= direction * cardWidth * 2;

  // limite esquerdo
  if (position > 0) position = 0;

  // limite direito correto
  const maxScroll = -(totalWidth - visibleWidth);
  if (position < maxScroll) position = maxScroll;

  container.style.transform = `translateX(${position}px)`;
}

function mostrarCadastro() {
  document.getElementById("telaLogin").style.display = "none";
  document.getElementById("telaCadastro").style.display = "block";
}

function mostrarLogin() {
  document.getElementById("telaLogin").style.display = "block";
  document.getElementById("telaCadastro").style.display = "none";
}

  function voltarHome() {
  location.reload();
}

  function acessarClube() {
  const user = firebase.auth().currentUser;

  if (user) {
    window.location.href = "meu-clube.html";
  } else {
    abrirLogin();
  }
}
  
</script>

</body>
</html>
